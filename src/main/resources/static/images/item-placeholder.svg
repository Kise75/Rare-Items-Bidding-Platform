<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 800" role="img" aria-labelledby="title desc">
  <title id="title">Hình ảnh dự phòng</title>
  <desc id="desc">Ảnh dự phòng khi vật phẩm chưa có ảnh hoặc link ảnh bị lỗi.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e2e8f0"/>
      <stop offset="100%" stop-color="#cbd5e1"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="800" fill="url(#bg)"/>
  <g transform="translate(600 360)">
    <rect x="-190" y="-150" width="380" height="260" rx="24" fill="#f8fafc" stroke="#94a3b8" stroke-width="12"/>
    <circle cx="-70" cy="-40" r="34" fill="#94a3b8"/>
    <path d="M-150 90 L-40 -20 L70 90 Z" fill="#94a3b8"/>
    <path d="M20 90 L95 10 L170 90 Z" fill="#64748b"/>
  </g>
  <text x="600" y="610" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="700" fill="#334155">
    Chưa có ảnh vật phẩm
  </text>
</svg>
